<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">

    <title>NowReview</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <nav>

        <a href="#" onclick="mostraPagina('home')">Home</a>

        <a href="#" onclick="mostraPagina('login')">Login</a>

        <a href="#" onclick="mostraPagina('profilo')">Profilo</a>

        <a href="#" onclick="mostraPagina('recensioni')">Recensioni</a>

        <a href="#" onclick="mostraPagina('forum')">Forum</a>

    </nav>

    <!-- HOME -->

    <div id="home" class="pagina attiva">

        <img src="logo.png" class="logo">

        <p>Sito di recensioni tech e forum.</p>

        <h2>Benvenuto</h2>

        <p>Qui puoi scrivere recensioni e fare domande.</p>

    </div>

    <!-- LOGIN -->

    <div id="login" class="pagina">
      <img src="logo.png" class="logo">
      
        
      

        <h2>Login</h2>

        <label>Email</label>

        <input type="email" id="email">

        <label>Password</label>

        <input type="password" id="password">

        <button onclick="login()">Accedi</button>

        <p id="messaggio-login"></p>

        <hr>

        <h2>Registrazione</h2>

        <label>Nome utente</label>

        <input type="text" id="reg-username">

        <label>Email</label>

        <input type="email" id="reg-email">

        <label>Password</label>

        <input type="password" id="reg-password">

        <button onclick="registrati()">Registrati</button>

        <p id="messaggio-registrazione"></p>

    </div>

    <!-- PROFILO -->
     

    <div id="profilo" class="pagina">
      <img src="logo.png" class="logo">

        <h2>Profilo</h2>

        <p id="nome-profilo">Nessun utente loggato</p>

    </div>

    <!-- RECENSIONI -->

    <div id="recensioni" class="pagina">
      <img src="logo.png" class="logo">

        <h2>Scrivi recensione</h2>

        <label>Prodotto</label>

        <select id="prodotto">

            <option>Raspberry Pi 5</option>

            <option>Logitech G Pro X</option>

            <option>Samsung SSD 990 Pro</option>

            <option>Keychron K2</option>

        </select>

        <label>Recensione</label>

        <textarea id="testo"></textarea>

        <button onclick="aggiungiRecensione()">Pubblica</button>

        <p id="messaggio-recensione"></p>

        <hr>

        <h2>Recensioni utenti</h2>

        <div id="lista-recensioni"></div>

    </div>

    <!-- FORUM -->

    <div id="forum" class="pagina">

        <h2>Forum</h2>
        
        <img src="logo.png" class="logo">

        <label>Scrivi domanda</label>

        <input type="text" id="domanda">

        <button onclick="aggiungiDomanda()">Invia</button>

        <p id="messaggio-domanda"></p>

        <hr>

        <h2>Domande</h2>

        <div id="lista-domande"></div>

        <hr>

        <h2>Rispondi</h2>

        <label>Numero domanda</label>

        <input type="number" id="numero-domanda">

        <label>Risposta</label>

        <textarea id="risposta"></textarea>

        <button onclick="aggiungiRisposta()">Invia risposta</button>

        <p id="messaggio-risposta"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
