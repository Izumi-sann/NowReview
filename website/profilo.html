<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>NowReview - Profilo</title>
    <link rel="stylesheet" href="stile.css">
</head>
<body>

    <nav>
        <a href="home.html" target="_blank">Home</a>
        <a href="login.html" target="_blank">Login</a>
        <a href="profilo.html" target="_blank">Profilo</a>
        <a href="recensioni.html" target="_blank">Recensioni</a>
        <a href="forum.html" target="_blank">Forum</a>
    </nav>

    <div class="contenuto">
        <img src="logo.png" class="logo">

        <h2>Profilo</h2>
        <div id="dati-profilo"><p>Caricamento...</p></div>
    </div>

    <script>
        fetch("api/sessione.php")
            .then(function(risposta) { return risposta.json(); })
            .then(function(dati) {
                var contenitore = document.getElementById("dati-profilo");

                if (!dati.loggato) {
                    contenitore.innerHTML = "<p>Nessun utente loggato. <a href='login.html' target='_blank'>Vai al login</a></p>";
                    return;
                }

                var utente = dati.utente;
                contenitore.innerHTML =
                    "<p><b>Nome utente:</b> " + utente.nomeutente + "</p>" +
                    "<p><b>Email:</b> " + utente.email + "</p>" +
                    "<br>" +
                    "<button onclick='faiLogout()'>Esci</button>";
            });

        function faiLogout() {
            fetch("api/logout.php")
                .then(function() {
                    window.location.href = "home.html";
                });
        }
    </script>

</body>
</html>
